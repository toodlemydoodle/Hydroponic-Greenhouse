<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hydroponic HMI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="hmi-container">
      <h1>Hydroponic HMI</h1>

      <div class="cards">
        <div class="card">
          <div class="label-row">
            <span class="label">Ambient</span>
            <span id="ambient" class="value">--</span>
          </div>
          <div class="status-row">
            <span id="ambient-status" class="status">--</span>
          </div>
        </div>

        <div class="card">
          <div class="label-row">
            <span class="label">UV</span>
            <span id="uv" class="value">--</span>
          </div>
        </div>

        <div class="card">
          <div class="label-row">
            <span class="label">Temperature</span>
            <span id="temp" class="value">--</span>
          </div>
          <div class="status-row">
            <span id="temp-status" class="status">--</span>
          </div>
        </div>

        <div class="card">
          <div class="label-row">
            <span class="label">Flow</span>
            <span id="flow" class="value">--</span>
          </div>
          <div class="status-row">
            <span id="flow-status" class="status">--</span>
          </div>
        </div>
      </div>

      <div id="last-update" class="last-update">Last update: --</div>

      <div class="feed-section">
        <button id="feed-btn" class="feed-btn">Feed</button>
        <div id="feed-status" class="feed-status"></div>
      </div>
    </div>

    <!-- Socket.IO client -->
    <script
      src="https://cdn.socket.io/4.7.5/socket.io.min.js"
      crossorigin="anonymous"
    ></script>

    <!-- Your JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
